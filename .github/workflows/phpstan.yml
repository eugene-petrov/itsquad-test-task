name: M2 PHPStan

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  magento-phpstan:
    name: M2 PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-phpstan-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-phpstan-

      - name: Configure repositories and plugins
        run: |
          composer config repositories.magento composer https://repo-magento-mirror.fooman.co.nz/
          composer config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer config --no-plugins allow-plugins.phpstan/extension-installer true
          composer config --no-plugins allow-plugins.magento/composer-dependency-version-audit-plugin true

      - name: Install dependencies
        run: |
          composer require --dev \
            phpstan/phpstan \
            phpstan/extension-installer \
            bitexpert/phpstan-magento \
            --no-interaction --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress
